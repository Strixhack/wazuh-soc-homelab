<!-- Wazuh Agent Configuration — Windows 10 VM -->
<!-- Wazuh SOC Home Lab | SRH Berlin MS Cybersecurity -->

<ossec_config>

  <!-- Agent connection to Wazuh Manager -->
  <client>
    <server>
      <address>192.168.56.101</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>windows</config-profile>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
  </client>

  <!-- File Integrity Monitoring -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>180</frequency>
    <scan_on_start>yes</scan_on_start>

    <!-- Monitor critical directories in real time -->
    <directories check_all="yes" realtime="yes">C:\Temp</directories>
    <directories check_all="yes" realtime="yes">C:\SOC-Lab</directories>
    <directories check_all="yes" realtime="yes">C:\Users\Public\Downloads</directories>
    <directories check_all="yes" realtime="yes">C:\Windows\System32\drivers</directories>

    <!-- Ignore noisy paths -->
    <ignore>C:\Windows\System32\LogFiles</ignore>
    <ignore>C:\Windows\System32\wbem\Logs</ignore>
    <ignore>C:\Windows\Prefetch</ignore>
  </syscheck>

  <!-- Log Collection — Sysmon -->
  <localfile>
    <location>Microsoft-Windows-Sysmon/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- Log Collection — Windows Security -->
  <localfile>
    <location>Security</location>
    <log_format>eventchannel</log_format>
    <query>Event/System[EventID != 5156 and EventID != 5447]</query>
  </localfile>

  <!-- Log Collection — Windows System -->
  <localfile>
    <location>System</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- Log Collection — PowerShell Script Block Logging -->
  <localfile>
    <location>Microsoft-Windows-PowerShell/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- Log Collection — Windows Firewall -->
  <localfile>
    <location>C:\Windows\System32\LogFiles\Firewall\pfirewall.log</location>
    <log_format>iis</log_format>
  </localfile>

  <!-- Active Response -->
  <active-response>
    <disabled>no</disabled>
  </active-response>

</ossec_config>
